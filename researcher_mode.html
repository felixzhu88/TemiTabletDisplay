<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Researcher Control Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --border: #2e2e2e;
      --accent: #e8ff47;
      --accent2: #47c9ff;
      --danger: #ff5c5c;
      --text: #f0f0f0;
      --muted: #666;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      justify-content: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .status-dot.error { background: var(--danger); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .screen-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-sans);
      padding: 20px 20px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
    }

    .screen-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .screen-btn:active { transform: translateY(0px); }

    .screen-btn.active {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.08);
      color: var(--accent);
    }

    .btn-num {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .screen-btn.active .btn-num { color: var(--accent); opacity: 0.7; }

    .btn-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
    }

    .btn-desc {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 300;
    }

    .screen-btn.active .btn-desc { color: var(--accent); opacity: 0.6; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .clear-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .clear-btn:hover {
      border-color: var(--danger);
      background: rgba(255, 92, 92, 0.08);
    }

    .clear-btn:active { transform: scale(0.99); }

    .current-display {
      margin-top: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      width: 100%;
      max-width: 480px;
    }

    .disp-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .disp-value {
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--accent2);
    }

    .disp-value.empty {
      color: var(--muted);
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1f1f1f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      transition: transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <div class="label">Research Study Interface</div>
    <h1>Researcher Control Panel</h1>
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting to Firebase...</span>
    </div>
  </header>

  <div class="panel">
    <div class="panel-title">Send screen to tablet</div>

    <div class="btn-stack">

      <button class="screen-btn" id="btn-screen1" onclick="sendScreen('screen1')">
        <span class="btn-num">01 ——</span>
        <span class="btn-label">Order Ready</span>
        <span class="btn-desc">"Your Order is Here" + missed order button</span>
      </button>

      <button class="screen-btn" id="btn-screen2" onclick="sendScreen('screen2')">
        <span class="btn-num">02 ——</span>
        <span class="btn-label">Apology Screen</span>
        <span class="btn-desc">"We're sorry — your drink is on its way"</span>
      </button>

      <button class="screen-btn" id="btn-screen3" onclick="sendScreen('screen3')">
        <span class="btn-num">03 ——</span>
        <span class="btn-label">QR Code to Survey</span>
        <span class="btn-desc">Follow up questions — takes ~3 minutes</span>
      </button>

    </div>

    <div class="divider"></div>

    <button class="clear-btn" onclick="clearDisplay()">⊘ &nbsp; Clear tablet display</button>
  </div>

  <div class="current-display">
    <div class="disp-label">Tablet currently showing</div>
    <div class="disp-value empty" id="currentScreen">— nothing —</div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDh0Azzq5cCUJIREWGn8Uky0wpjAn_hF4Y",
      authDomain: "temi-tablet-display.firebaseapp.com",
      databaseURL: "https://temi-tablet-display-default-rtdb.firebaseio.com/",
      projectId: "temi-tablet-display",
      storageBucket: "temi-tablet-display.firebasestorage.app",
      messagingSenderId: "200677882490",
      appId: "1:200677882490:web:e08c52af15ced7ec64d9c3"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

    const db = firebase.database();
    const tabletRef = db.ref('tablet/currentScreen');

    const screenLabels = {
      screen1: 'Screen 1 — Order Ready',
      screen2: 'Screen 2 — Apology Screen',
      screen3: 'Screen 3 — QR Code to Survey',
    };

    db.ref('.info/connected').on('value', (snap) => {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (snap.val()) {
        dot.className = 'status-dot connected';
        txt.textContent = 'Connected';
      } else {
        dot.className = 'status-dot error';
        txt.textContent = 'Disconnected';
      }
    });

    tabletRef.on('value', (snap) => {
      const val = snap.val();
      const el = document.getElementById('currentScreen');
      document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('active'));
      if (val) {
        el.textContent = screenLabels[val] || val;
        el.className = 'disp-value';
        const btn = document.getElementById('btn-' + val);
        if (btn) btn.classList.add('active');
      } else {
        el.textContent = '— nothing —';
        el.className = 'disp-value empty';
      }
    });

    function sendScreen(screenName) {
      tabletRef.set(screenName).then(() => {
        showToast('Sent → ' + (screenLabels[screenName] || screenName));
      }).catch(err => {
        showToast('Firebase error — check config');
        console.error(err);
      });
    }

    function clearDisplay() {
      tabletRef.set(null).then(() => {
        showToast('Tablet display cleared');
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
  </script>

</body>
</html>
