<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tablet</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --cream: #f2ede4;
      --brown: #3b2a1a;
      --brown-light: #7a5c3e;
      --green: #2d6a4f;
      --green-light: #e8f5ee;
      --red-soft: #c0392b;
      --red-bg: #fdf1f0;
      --text: #2c1f0f;
      --muted: #9c8470;
      --border: #e0d5c5;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      overflow: hidden;
    }

    /* ── IDLE SCREEN ─────────────────────────────── */
    #idle-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.5s ease;
    }

    .idle-dot-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .idle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      animation: idlePulse 2.4s ease-in-out infinite;
    }
    .idle-dot:nth-child(2) { animation-delay: 0.3s; }
    .idle-dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes idlePulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .idle-text {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── SHARED SCREEN STYLES ────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      text-align: center;
    }

    .screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* ── SCREEN 1 — ORDER READY ──────────────────── */
    #screen1 {
      background: var(--bg);
    }

    .order-icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: iconBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-play-state: paused;
    }

    #screen1.visible .order-icon {
      animation-play-state: running;
    }

    @keyframes iconBounce {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .order-headline {
      font-family: var(--serif);
      font-size: clamp(36px, 7vw, 58px);
      color: var(--brown);
      line-height: 1.1;
      margin-bottom: 12px;
      animation: fadeUp 0.5s 0.15s ease both;
      animation-play-state: paused;
    }

    #screen1.visible .order-headline { animation-play-state: running; }

    .order-sub {
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 56px;
      animation: fadeUp 0.5s 0.25s ease both;
      animation-play-state: paused;
    }

    #screen1.visible .order-sub { animation-play-state: running; }

    .divider-line {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 48px;
      animation: fadeUp 0.5s 0.3s ease both;
      animation-play-state: paused;
    }

    #screen1.visible .divider-line { animation-play-state: running; }

    .complaint-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 400;
      padding: 14px 28px;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeUp 0.5s 0.4s ease both;
      animation-play-state: paused;
    }

    #screen1.visible .complaint-btn { animation-play-state: running; }

    .complaint-btn:hover {
      border-color: var(--red-soft);
      color: var(--red-soft);
      background: var(--red-bg);
    }

    .complaint-btn:active {
      transform: scale(0.97);
    }

    /* ── SCREEN 2 — APOLOGY ──────────────────────── */
    #screen2 {
      background: #f7f4ef;
    }

    .apology-icon {
      font-size: 52px;
      margin-bottom: 28px;
      animation: iconBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-play-state: paused;
    }

    #screen2.visible .apology-icon { animation-play-state: running; }

    .apology-headline {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(28px, 5.5vw, 46px);
      color: var(--brown);
      line-height: 1.15;
      margin-bottom: 28px;
      animation: fadeUp 0.5s 0.1s ease both;
      animation-play-state: paused;
    }

    #screen2.visible .apology-headline { animation-play-state: running; }

    .apology-body {
      font-size: 18px;
      color: var(--brown-light);
      font-weight: 300;
      line-height: 1.8;
      max-width: 380px;
      animation: fadeUp 0.5s 0.22s ease both;
      animation-play-state: paused;
    }

    #screen2.visible .apology-body { animation-play-state: running; }

    .apology-body strong {
      font-weight: 500;
      color: var(--brown);
    }

    .apology-rule {
      width: 40px;
      height: 2px;
      background: var(--brown-light);
      opacity: 0.25;
      margin: 32px auto 0;
      border-radius: 2px;
      animation: fadeUp 0.5s 0.35s ease both;
      animation-play-state: paused;
    }

    #screen2.visible .apology-rule { animation-play-state: running; }

    /* ── SHARED ANIMATION ────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <!-- Idle -->
  <div id="idle-screen">
    <div class="idle-dot-row">
      <div class="idle-dot"></div>
      <div class="idle-dot"></div>
      <div class="idle-dot"></div>
    </div>
    <p class="idle-text">Waiting...</p>
  </div>

  <!-- Screen 1: Order Ready -->
  <div class="screen" id="screen1">
    <div class="order-icon">☕</div>
    <h1 class="order-headline">Your Order<br>is Here</h1>
    <p class="order-sub">Enjoy!</p>
    <div class="divider-line"></div>
    <button class="complaint-btn" onclick="reportMissedOrder()">
      Didn't receive your order? Press here.
    </button>
  </div>

  <!-- Screen 2: Apology -->
  <div class="screen" id="screen2">
    <div class="apology-icon">🙏</div>
    <h2 class="apology-headline">We are sorry<br>for the mistake.</h2>
    <p class="apology-body">
      Please sit tight —<br>
      <strong>we will arrive with your drink shortly.</strong>
    </p>
    <div class="apology-rule"></div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = initializeApp({
        apiKey: "AIzaSyDh0Azzq5cCUJIREWGn8Uky0wpjAn_hF4Y",
        authDomain: "temi-tablet-display.firebaseapp.com",
        databaseURL: "https://temi-tablet-display-default-rtdb.firebaseio.com/",
        projectId: "temi-tablet-display",
        storageBucket: "temi-tablet-display.firebasestorage.app",
        messagingSenderId: "200677882490",
        appId: "1:200677882490:web:e08c52af15ced7ec64d9c3",
        measurementId: "G-YVJTF25Z9P"
    });

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const tabletRef = ref(db, 'tablet/currentScreen');

    const allScreens = ['screen1', 'screen2'];

    function showScreen(name) {
      const idle = document.getElementById('idle-screen');
      allScreens.forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('visible');
      });

      if (!name) {
        idle.style.opacity = '1';
        idle.style.pointerEvents = 'all';
      } else {
        idle.style.opacity = '0';
        idle.style.pointerEvents = 'none';
        const target = document.getElementById(name);
        if (target) {
          // Small delay lets CSS reset animations before re-adding .visible
          setTimeout(() => target.classList.add('visible'), 30);
        }
      }
    }

    // Listen for researcher commands
    onValue(tabletRef, (snap) => {
      showScreen(snap.val());
    });

    // Complaint button: tablet pushes itself to screen2
    window.reportMissedOrder = function() {
      set(tabletRef, 'screen2');
    };
  </script>

</body>
</html>
